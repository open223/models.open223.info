# https://github.com/executablebooks/github-action-demo/blob/master/.github/workflows/book.yml
name: deploy-book

on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# This job installs dependencies, build the book, and pushes it to `gh-pages`
jobs:
  deploy-book:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Fix timestamps
    - name: restore timestamps
      uses: chetan/git-restore-mtime-action@v2
    #- name: Restore file modification times
    #  run: |
    #    git ls-files -z models tools/compile.py | while IFS= read -r -d '' f; do
    #      ts="$(git log -1 --format='%at' -- "$f")"
    #      if [ -n "$ts" ]; then
    #        touch -d "@$ts" "$f"
    #      fi
    #    done

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: what will be compiled?
      run: |
        make -n

    - name: build examples
      run: |
        bash build_examples.sh

    - name: build jupyter book
      run: |
        uv run jupyter-book build --html --execute 
    - name: stage pages assets
      run: |
        # GitHub Pages requires a root index.html in publish_dir.
        if [ -f _build/html/index.html ]; then
          site_dir="_build/html"
        elif [ -f _build/site/public/index.html ]; then
          site_dir="_build/site/public"
        else
          echo "Could not find a publishable site with index.html in _build/html or _build/site/public"
          find _build -maxdepth 3 -type f | sed -n '1,200p'
          exit 1
        fi

        cp CNAME "${site_dir}/"
        mkdir -p "${site_dir}/models" "${site_dir}/compiled" "${site_dir}/withimports"

        # Keep source model downloads at both legacy root paths and /models/.
        find models -maxdepth 1 -type f \( -name '*.ttl' -o -name '*.jsonld' \) -exec cp {} "${site_dir}/" \;
        find models -maxdepth 1 -type f \( -name '*.ttl' -o -name '*.jsonld' \) -exec cp {} "${site_dir}/models/" \;
        find models/compiled -maxdepth 1 -type f -name '*.ttl' -exec cp {} "${site_dir}/compiled/" \;
        find models/withimports -maxdepth 1 -type f -name '*.ttl' -exec cp {} "${site_dir}/withimports/" \;

        echo "PUBLISH_DIR=${site_dir}" >> "$GITHUB_ENV"
        ls -la "${site_dir}" | sed -n '1,200p'

    - name: verify published model artifacts
      run: |
        set -euo pipefail

        site_dir="${PUBLISH_DIR:?PUBLISH_DIR was not set by stage step}"
        test -f "${site_dir}/index.html"
        root_count=$(find "${site_dir}" -maxdepth 1 -type f \( -name '*.ttl' -o -name '*.jsonld' \) | wc -l | tr -d ' ')
        models_count=$(find "${site_dir}/models" -maxdepth 1 -type f \( -name '*.ttl' -o -name '*.jsonld' \) | wc -l | tr -d ' ')
        compiled_count=$(find "${site_dir}/compiled" -maxdepth 1 -type f -name '*.ttl' | wc -l | tr -d ' ')
        withimports_count=$(find "${site_dir}/withimports" -maxdepth 1 -type f -name '*.ttl' | wc -l | tr -d ' ')

        echo "root model files: ${root_count}"
        echo "models/ files: ${models_count}"
        echo "compiled/ files: ${compiled_count}"
        echo "withimports/ files: ${withimports_count}"

        [ "${root_count}" -gt 0 ]
        [ "${models_count}" -gt 0 ]
        [ "${compiled_count}" -gt 0 ]
        [ "${withimports_count}" -gt 0 ]

        sample_path="$(find models -maxdepth 1 -type f -name '*.ttl' | head -n 1)"
        if [ -z "${sample_path}" ]; then
          echo "No source .ttl files found under models/"
          exit 1
        fi
        sample_file="${sample_path##*/}"
        test -f "${site_dir}/${sample_file}"
        test -f "${site_dir}/models/${sample_file}"
        test -f "${site_dir}/compiled/${sample_file}"
        test -f "${site_dir}/withimports/${sample_file}"

    # Push the book's HTML to github-pages
    - name: GitHub Pages action
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ${{ env.PUBLISH_DIR }}
