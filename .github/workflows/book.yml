# https://github.com/executablebooks/github-action-demo/blob/master/.github/workflows/book.yml
name: deploy-book

on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# This job installs dependencies, build the book, and pushes it to `gh-pages`
jobs:
  deploy-book:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Fix timestamps
    - name: restore timestamps
      uses: chetan/git-restore-mtime-action@v2
    #- name: Restore file modification times
    #  run: |
    #    git ls-files -z models tools/compile.py | while IFS= read -r -d '' f; do
    #      ts="$(git log -1 --format='%at' -- "$f")"
    #      if [ -n "$ts" ]; then
    #        touch -d "@$ts" "$f"
    #      fi
    #    done

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: what will be compiled?
      run: |
        make -n

    - name: build examples
      run: |
        bash build_examples.sh

    - name: build jupyter book
      run: |
        uv run jupyter-book build --html --execute 
        ls -l _build/site/public

    - name: fix CNAME
      run: |
        cp CNAME _build/site/public/

    # Push the book's HTML to github-pages
    - name: GitHub Pages action
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./_build/site/public
